name: Remote Access Tests

on:
  push:
    branches: [main]
  pull_request: {}

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          lfs: true

      - name: Install common dependencies
        uses: ./.github/actions/common-deps

      - name: Install CUDA headers for NVENC
        run: |
          sudo apt-get install -y --no-install-recommends nvidia-cuda-dev
          echo "CUDA_HOME=/usr" >> $GITHUB_ENV

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Start LiveKit server
        run: docker compose up -d --wait

      - name: Run LiveKit integration tests
        run: cargo test -p remote_access_tests --features require-cuda -- --ignored livekit_

      - name: Run auth integration tests
        if: ${{ !github.event.pull_request.head.repo.fork && github.actor != 'dependabot[bot]' }}
        run: cargo test -p remote_access_tests --features require-cuda -- --ignored auth_
        env:
          FOXGLOVE_API_KEY: ${{ secrets.REMOTE_ACCESS_TESTS_API_KEY }}

      - name: Capture LiveKit logs on failure
        if: failure()
        run: docker compose logs livekit > livekit.log
      - name: Upload LiveKit logs
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: livekit-logs
          path: livekit.log

      - name: Stop LiveKit server
        if: always()
        run: docker compose down

  netem-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          lfs: true

      - name: Install common dependencies
        uses: ./.github/actions/common-deps

      - name: Install CUDA headers for NVENC
        run: |
          sudo apt-get install -y --no-install-recommends nvidia-cuda-dev
          echo "CUDA_HOME=/usr" >> $GITHUB_ENV

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Start LiveKit with netem
        run: docker compose -f docker-compose.yaml -f docker-compose.netem.yml up -d --wait

      - name: Run netem integration tests
        run: cargo test -p remote_access_tests --features require-cuda -- --ignored netem_

      - name: Capture LiveKit logs on failure
        if: failure()
        run: docker compose -f docker-compose.yaml -f docker-compose.netem.yml logs livekit > livekit.log
      - name: Upload LiveKit logs
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: livekit-logs-netem
          path: livekit.log

      - name: Stop LiveKit with netem
        if: always()
        run: docker compose -f docker-compose.yaml -f docker-compose.netem.yml down

  netem-perlink-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          lfs: true

      - name: Install common dependencies
        uses: ./.github/actions/common-deps

      - name: Install CUDA headers for NVENC
        run: |
          sudo apt-get install -y --no-install-recommends nvidia-cuda-dev
          echo "CUDA_HOME=/usr" >> $GITHUB_ENV

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Start LiveKit with per-link netem
        run: >
          docker compose
          -f docker-compose.yaml
          -f docker-compose.netem.yml
          -f docker-compose.netem-perlink.yml
          up -d --wait

      - name: Run per-link netem integration tests
        run: cargo test -p remote_access_tests --features require-cuda -- --ignored perlink_

      - name: Capture LiveKit logs on failure
        if: failure()
        run: >
          docker compose
          -f docker-compose.yaml
          -f docker-compose.netem.yml
          -f docker-compose.netem-perlink.yml
          logs livekit > livekit.log
      - name: Upload LiveKit logs
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: livekit-logs-perlink
          path: livekit.log

      - name: Stop per-link netem stack
        if: always()
        run: >
          docker compose
          -f docker-compose.yaml
          -f docker-compose.netem.yml
          -f docker-compose.netem-perlink.yml
          down
